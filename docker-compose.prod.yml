# Production override: Caddy for HTTPS, no host port exposure for frontend/backend/postgres.
# Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    ports: []
    deploy:
      resources:
        limits:
          memory: 450M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  # MinIO: do not expose 9000/9001 to the host in production. Backend/backup use minio:9000 internally.
  # Require explicit S3_ACCESS_KEY/S3_SECRET_KEY so default minioadmin is never used in prod.
  minio:
    ports: []
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env for production MinIO}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env for production MinIO}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M

  backup:
    image: st2-backup:latest
    build:
      context: ./deploy/backup
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PGHOST: st2_postgres
      POSTGRES_USER: ${POSTGRES_USER:-smart_trainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-smart_trainer}
      S3_BACKUP_BUCKET: ${S3_BACKUP_BUCKET:?Set S3_BACKUP_BUCKET for production backup}
      S3_BACKUP_ACCESS_KEY: ${S3_BACKUP_ACCESS_KEY:?Set S3_BACKUP_ACCESS_KEY for production backup}
      S3_BACKUP_SECRET_KEY: ${S3_BACKUP_SECRET_KEY:?Set S3_BACKUP_SECRET_KEY for production backup}
      S3_BACKUP_ENDPOINT: ${S3_BACKUP_ENDPOINT:-}
      S3_BACKUP_PREFIX: ${S3_BACKUP_PREFIX:-backups/postgres/}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-0}
    depends_on:
      - postgres
    networks:
      - backend-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: "0.25"
        reservations:
          memory: 64M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend-db
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: "0.25"
        reservations:
          memory: 64M

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - backend-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: "0.25"
        reservations:
          memory: 32M

  caddy:
    image: caddy:alpine
    networks:
      - frontend-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env for production}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-st2_frontend}
    depends_on:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
        reservations:
          memory: 32M

  backend:
    ports: []
    volumes: []
    restart: unless-stopped
    environment:
      # Stack deploy uses DNS names st2_postgres, st2_redis (stack name + service name)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smart_trainer}:${POSTGRES_PASSWORD}@st2_postgres:5432/${POSTGRES_DB:-smart_trainer}
      REDIS_URL: redis://st2_redis:6379/0
    deploy:
      resources:
        limits:
          memory: 700M
          cpus: "0.75"
        reservations:
          memory: 128M
          cpus: "0.25"

  frontend:
    ports: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M

volumes:
  caddy_data:
  caddy_config:
  grafana_data:
