# Override for 2GB RAM servers (e.g. prod when DEPLOY_TARGET=prod).
# Use with: docker stack deploy -c docker-compose.yml -c docker-compose.prod.yml -c docker-compose.2gb.yml st2
# Total memory limits ~1GB to leave headroom for OS and spikes.
services:
  postgres:
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.4"
        reservations:
          memory: 64M
          cpus: "0.1"

  redis:
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"
        reservations:
          memory: 16M

  minio:
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"
        reservations:
          memory: 32M

  backend:
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 96M
          cpus: "0.15"

  frontend:
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"
        reservations:
          memory: 24M

  landing:
    deploy:
      resources:
        limits:
          memory: 48M
          cpus: "0.15"
        reservations:
          memory: 24M

  caddy:
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"
        reservations:
          memory: 24M

  backup:
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
        reservations:
          memory: 48M

  prometheus:
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
        reservations:
          memory: 48M

  grafana:
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"
        reservations:
          memory: 24M
